name: Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke-tests:
    name: PHP ${{ matrix.php }} smoke tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php:
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Check PHP syntax
        run: |
          php -l raw-handler.php
          php -l includes/class-transform-registry.php
          php -l includes/class-block-factory.php

      - name: Run smoke tests
        run: |
          php tests/smoke-layout-transforms.php
          php tests/smoke-action-text-transforms.php
          php tests/smoke-media-embed-transforms.php
          php tests/smoke-unsupported-html-fallback-hook.php
          php tests/smoke-php-scoper-callback.php

      - name: Check whitespace errors
        run: git diff --check
